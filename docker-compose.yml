services:
  backend:
    image: punch_system:0.1
    container_name: punch-system-backend
    restart: unless-stopped
    env_file:
      - ./punch_system/.env
    environment:
      FLASK_DEBUG: "0"
      FLASK_HOST: 0.0.0.0
      PORT: "5001"
      RUN_DB_SETUP: "1"
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "8"
      GUNICORN_TIMEOUT: "60"
    expose:
      - "5001"
    networks:
      - punch-net

  frontend:
    image: punch_system_vue:0.1
    container_name: punch-system-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - punch-net

networks:
  punch-net:
    driver: bridge
